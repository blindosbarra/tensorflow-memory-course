  - "2026-07-16: learner asked for a single notebook consolidating the whole main-course memory-building exercise (not the PMLE track) with a resource/cost estimate. Scoped via clarifying questions to: consolidate the 15 already-built lessons (not the still-planned embedding/Transformer/LoRA/capstone phases) plus local/Colab compute requirements (not cloud $ cost). Added notebooks/consolidato-memoria-lezioni-01-15.ipynb: regenerates the full data pipeline from raw synthetic CSVs through the final memory-type classifier end to end (Fase 1 cleaning/leakage-audit/feature-encoding, Fase 0 NumPy/gradient-descent/softmax baseline, Fase 2 Keras dense network with an overfitting demo and the regularized final architecture, Fase 3 start with tf.data and the TextVectorization bag-of-words model), condensing redundant re-demonstrations (e.g. Lesson 11's GradientTape rewrite, Lesson 14's tf.data rewrite) into brief illustrative snippets rather than retraining the same architecture repeatedly. Reproduces the same headline result as Lesson 15 (numeric features plateau ~60-65% validation accuracy, reading the actual memory text via bag-of-words lifts it to ~95%). Resource-estimate section uses numbers measured by actually executing the notebook in this session (55-58s wall time across two runs, 781 MB peak RAM, no GPU needed, ~3 GB disk for the TF/Keras environment), not theoretical guesses. Verified: ruff clean, and the notebook executes without errors both standalone and as part of the full `scripts/execute_notebooks.py` run across all 16 notebooks (~3m35s total)."
