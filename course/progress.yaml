  - 2026-07-11 learner review failed course content; both existing lessons were reworked.
  - Both lessons traversed writing, lab_build and technical_review again and stop at learner_review in_progress.
  - 2026-07-11 B4 correction moved both lesson domains to environmental sensors; Memory AI remains a final motivated transfer.
  - 2026-07-12 notebook learner cells were made genuinely incomplete and excluded only from the automated execution copy.
  - Only a learner human may mark either lesson done after completing the required review template.
  - "2026-07-12 independent verification against the binding report: PASS with corrections (reports/reviews/content-rework-verification.md)."
  - "Corrections applied: Chaudhuri DOI fixed to 10.1145/872757.872796, phantom file references removed from evidence.yaml and TEAM_RUNBOOK, concepts.md realigned to the sensor domain, README and modules index updated."
  - Next after human learner PASS and Fase 0 validation, the next lesson is python-numpy-refresh.
  - "2026-07-12 format change requested by the learner: each lesson is now a self-contained notebook (broad theory, runnable examples, guided exercise with visible explained solution, quiz with answers) plus one incremental project step (Memory AI Lab). The starter-file + hidden-pytest exercise flow was removed from the learner path."
  - The project thread lives in datasets/processed/memory_events_clean.csv and grows one component per lesson.
  - "2026-07-12 learner PASSED the notebook format on lesson 1; lessons 3-5 (train/validation/test, data leakage, encoding/scaling) produced in the same format with project steps 3-5."
  - "Notebooks renamed with lezione-NN prefixes so execution order matches lesson order."
  - "Learner chose to finish the applied data phase first; Fase 0 (foundations) is scheduled right before Fase 2."
  - "2026-07-12 acceleration requested by the learner: Fase 0 delivered complete (lessons 6-9, NumPy / tensors / gradients / loss) in the notebook format."
  - "Project steps 6-9: class signatures via masks, X @ W scores with random weights, first learned parameters via gradient descent, and a hand-built softmax regression baseline (60% val vs 51% majority class) saved to datasets/processed."
  - "Next block: Fase 2 (Keras dense networks); tf.data lessons of Fase 1 move alongside it."
  - "2026-07-12 Fase 2 first block delivered (lessons 10-12): first Keras network vs the Fase 0 baseline, the training loop rewritten by hand with GradientTape, overfitting curves with early stopping and dropout, final honest test evaluation and the first saved model (models/, gitignored because Keras files are not byte-stable)."
  - "Lessons 10-12 consolidate planned keras-dnn pairs: perceptron+forward+sequential, fit+backprop-autodiff, regularization+callbacks. Remaining keras-dnn lessons: losses-optimizers deep dive, functional API, evaluation-calibration."
  - "CI now installs the ml extra (TensorFlow) to execute notebooks 10-12."
  - "2026-07-12 lessons 13-15 delivered: classifier report card (precision/recall/F1, confusion matrix, calibration check), tf.data input pipelines with the shuffle-buffer trap, and Fase 3 opened with tokenization."
  - "Lesson 15 milestone: reading the memory text (train-only vocabulary, multi-hot bag of words) lifts validation accuracy from ~60-65% to ~95%, confirming the feature-bottleneck diagnosis of lessons 10-12."
  - "Next block: embedding layer, sentence embeddings and cosine similarity."
  - "2026-07-13 learner asked to add a theory-only (no notebook) track covering the GCP Professional ML Engineer certification exam guide updated after 2026-06-01."
  - "Verified via official cloud.google.com/learn certification page: exam restructured into 6 domains, Vertex AI references replaced by 'Gemini Enterprise Agent Platform' in places. Primary exam guide PDF and docs.cloud.google.com product docs unreachable from this sandbox this session (see research_gaps.md)."
  - "Added optional module gcp-ml-certification to course.yaml (outside the mandatory progression, spec section 3.4), theory-only lessons pmle-01..06 mapped 1:1 to the six official domains. Built pilot lesson pmle-01 only; kept in evidence_review per Gate A until gaps close."
  - "2026-07-13: learner uploaded the verbatim official exam guide PDF directly, closing the primary sourcing gap for the whole gcp-ml-certification module. Read in full (6 sections, all subsections and bullets). Rewrote pmle-01's evidence.yaml/concepts/apis/pitfalls/references and its docs page to remove pre-PDF hedging; research gate flipped fail -> pass for core content. Built the five remaining lessons (pmle-02..06), each with a full knowledge pack and docs page grounded in the verbatim guide text, following the same pattern. All six domains of the exam guide are now covered. Module status moved planned -> in_progress; each lesson is in state_machine writing (technical_review and learner_review still pending, per the spec's quality-gate process)."
  - "2026-07-14 learner feedback: pmle track read as a syllabus, not a course (no mechanism explanations for BigQuery ML, AutoML, model evaluation, LLM tuning/pipelines/drift). Deepened pmle-01 with real BigQuery ML SQL/TRANSFORM/ML.EVALUATE mechanics, AutoML NAS+HPO explanation, and the prompting->LoRA->full-fine-tuning cost ladder, all needs_reverification general knowledge clearly separated from exam-guide-verified content. Learner also flagged that the BigQuery ML model_type list assumed prior knowledge of each algorithm (LINEAR_REG, LOGISTIC_REG, BOOSTED_TREE_*, KMEANS, DNN_*) -- added a callout in pmle-01 explaining what each one actually is and when to use it."
  - "2026-07-14: learner flagged that every pmle-02..06 docs page had a 'Scenari di ragionamento' section pointing to `knowledge/.../examples.md` -- a repo file path meaningless to a reader on the published docs site, with no indication of what it was or that they needed to go find it in the git repo. Fixed across all five lessons: removed the dangling section and folded its worked scenarios inline into the 'Teoria essenziale' subsections instead, continuing the same 'Nordica Commerce' running example from pmle-01 through the rest of the certification track (data preprocessing, notebook prototyping, experiment tracking/AutoSxS in pmle-02; interpretability, fine-tuning-vs-prompting, data/model parallelism in pmle-03; batch-vs-online serving, canary/A-B rollout, Feature Store skew in pmle-04; pipeline components, data validation, retraining policy in pmle-05; prompt injection/Model Armor, data/concept/feature-attribution drift in pmle-06)."
