site_name: TensorFlow Memory AI Lab
site_description: Corso pratico incrementale su TensorFlow, Keras, modelli open e sistemi di memoria.
site_url: https://blindosbarra.github.io/tensorflow-memory-course/
theme:
  name: material
nav:
  - Home: index.md
  - Syllabus: syllabus.md
  - Corso:
      - Panoramica: modules/index.md
      - "Lezione 1 — Missing values": modules/data-cleaning-01-missing-values.md
      - "Lezione 2 — Duplicati, tipi e outlier": modules/duplicates-types-outliers.md
      - "Lezione 3 — Train, validation e test": modules/train-validation-test.md
      - "Lezione 4 — Data leakage": modules/data-leakage.md
      - "Lezione 5 — Encoding e scaling": modules/categorical-encoding-scaling.md
      - "Lezione 6 — NumPy": modules/python-numpy-refresh.md
      - "Lezione 7 — Vettori, matrici e tensori": modules/vectors-matrices-tensors.md
      - "Lezione 8 — Gradienti": modules/derivatives-gradients-chain-rule.md
      - "Lezione 9 — Loss function": modules/probability-loss-functions.md
      - "Lezione 10 — La prima rete neurale": modules/perceptron-dense-layer.md
      - "Lezione 11 — Dentro il training": modules/model-fit-under-the-hood.md
      - "Lezione 12 — Overfitting": modules/regularization-dropout.md
      - "Lezione 13 — Valutare un classificatore": modules/evaluation-calibration.md
      - "Lezione 14 — Pipeline tf.data": modules/tfdata-basics.md
      - "Lezione 15 — Tokenizzazione": modules/tokenization-vocabulary.md
  - "Certificazione GCP PMLE (facoltativo)":
      - "Dominio 1 — Architetture low-code": modules/pmle-01-architect-low-code-ai-solutions.md
      - "Dominio 2 — Collaborare su dati e modelli": modules/pmle-02-collaborate-manage-data-models.md
      - "Dominio 3 — Scalare i prototipi": modules/pmle-03-scale-prototypes-into-ml-models.md
      - "Dominio 4 — Servire e scalare i modelli": modules/pmle-04-serve-and-scale-models.md
      - "Dominio 5 — Automatizzare le pipeline": modules/pmle-05-automate-orchestrate-ml-pipelines.md
      - "Dominio 6 — Monitorare le soluzioni AI": modules/pmle-06-monitor-ai-solutions.md
  - Glossario: glossary.md
  - Riferimenti: references.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
