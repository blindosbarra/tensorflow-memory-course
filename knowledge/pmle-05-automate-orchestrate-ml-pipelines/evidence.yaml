  - id: pipeline-compile-submit-trigger-implementation
    claim: "Running a pipeline requires compiling the Python pipeline definition into a portable JSON/YAML graph definition, then submitting it with a pipeline root (a Cloud Storage location for intermediate artifacts between components) and run-specific parameter values. A pipeline needs an explicit trigger to start: a scheduled (cron-style) trigger for a fixed-interval retraining policy, or an event-driven trigger (e.g. reacting to a new file landing in a Cloud Storage bucket) for a data-arrival-driven policy."
    importance: major
    source_url: "general pre-training MLOps knowledge (pipeline compilation/submission/triggering), not from the exam guide"
    source_title: "General knowledge of managed pipeline compilation, submission, and triggering mechanics"
    publisher: "n/a"
