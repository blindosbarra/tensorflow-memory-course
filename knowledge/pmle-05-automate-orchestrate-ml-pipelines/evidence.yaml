    status: needs_reverification
  - id: cicd-cloud-build-implementation
    claim: "A CI/CD pipeline for ML code (e.g. via Cloud Build) runs a step sequence in a container on each code push to a Git repository: run automated tests on pipeline component code, recompile the pipeline definition, submit/run the compiled pipeline. This code-push-triggered CI/CD flow is distinct from the metric-degradation-threshold-triggered CT (continuous training) flow: CI/CD verifies a code change doesn't break the pipeline, CT verifies the model itself needs retraining even when code hasn't changed; a mature pipeline setup needs both trigger types, not just one."
    importance: major
    source_url: "general pre-training CI/CD/MLOps knowledge, not from the exam guide"
