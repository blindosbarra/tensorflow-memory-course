  - id: kfp-pipeline-definition-example
    claim: "Worked illustration of a Kubeflow Pipelines SDK pipeline definition (@dsl.component / @dsl.pipeline decorators) with four components (validate data, extract features, train, evaluate) wired into a DAG by passing outputs as inputs, plus a conditional deploy step gated on an evaluation metric threshold. The same SDK/pipeline code can run on either a self-managed Kubeflow-on-GKE cluster or on the managed Agent Platform Pipelines execution engine; the choice between the two is an infrastructure trade-off (managed/no cluster to administer/tight integration with other Agent Platform services vs self-managed/portable across clouds or on-prem/fine-grained cluster control), not a difference in how the pipeline itself is authored."
    importance: major
