  - id: cnn-mechanics-general
    claim: "CNNs use small filters (e.g. 3x3) that slide across an image and reuse the same weights at every position (parameter sharing), giving far fewer parameters than a dense layer connecting every pixel independently (worked example: a 100x100 grayscale image to 100 dense neurons needs 1,000,000 weights, versus 288 weights for 32 3x3 filters, independent of image size). A convolution computes an element-wise product-and-sum between the filter and an image patch; pooling layers (e.g. max pooling) downsample feature maps afterward, keeping the strongest signal."
    importance: major
    source_url: "general pre-training ML knowledge (CNN architecture), not from the exam guide"
    source_title: "General knowledge of convolutional neural network mechanics"
    publisher: "n/a"
    accessed_at: "not applicable — general pre-training knowledge, not fetched this session"
    primary_source: false
    evidence_note: "Added at the learner's request for detailed CNN/RNN explanation. The exam guide only says 'DNN for complex patterns' without naming CNN. Standard CNN mechanics, not specific to a Google Cloud product. The worked convolution example (a 3x3 Laplacian-like kernel over a 3x3 patch of [10,10,10,10,50,10,10,10,10], summing to 160) is an invented teaching illustration, arithmetic double-checked: 0*10-1*10+0*10-1*10+4*50-1*10+0*10-1*10+0*10 = -40+200 = 160."
    status: needs_reverification
  - id: rnn-mechanics-and-transformer-note
    claim: "RNNs process a sequence one element at a time, maintaining a hidden state updated at each step (state_t = f(W_x*input_t + W_h*state_{t-1})) with the same weights reused across all time steps. Backpropagation through time can cause vanishing or exploding gradients over long sequences, impairing learning of long-range dependencies; LSTM and GRU variants add gating mechanisms that mitigate (not eliminate) this. Modern foundational text models (as referenced in Domain 1's Model Garden) use the Transformer architecture instead of RNNs, processing sequence elements in parallel via an attention mechanism rather than sequential recurrence, which trains faster on parallel hardware and is less prone to the vanishing-gradient issue tied to sequential state propagation."
    importance: major
    source_url: "general pre-training ML knowledge (RNN/LSTM/GRU mechanics, Transformer architecture), not from the exam guide"
    source_title: "General knowledge of recurrent neural networks and the Transformer architecture"
    publisher: "n/a"
    accessed_at: "not applicable — general pre-training knowledge, not fetched this session"
    primary_source: false
    evidence_note: "Added at the learner's request for detailed RNN explanation, including when it is/isn't still the right choice within this module's own scenarios (time series vs. text). Standard ML architecture knowledge, matching what the main course's later 'transformers-gemma' module covers with code; not specific to a Google Cloud product, not re-verified against live documentation this session. Does not claim which exact architecture Gemini uses internally beyond 'Transformer-family', which is standard industry knowledge about modern foundational language models generally."
    status: needs_reverification
  - id: custom-training-job-implementation
    claim: "Submitting a custom training job requires specifying a worker pool spec: container image, machine type, accelerator type/count, and replica count; distributed training uses a chief/master pool (one coordinating replica) plus additional worker pools. Hyperparameter tuning defines a search space (e.g. a continuous log-scale range for learning rate, a discrete set for batch size) and an objective metric, running multiple trials up to a budget and using prior trial results to guide which combinations to try next (Bayesian optimization), rather than exhaustive grid search. Common training failures: a job on a preemptible/spot VM loses all progress on interruption unless it periodically checkpoints weights and optimizer state to Cloud Storage; an out-of-memory error on the accelerator is usually fixed by reducing batch size, not by suspecting the model architecture; regional GPU/TPU quota limits are a common practical blocker distinct from any ML problem."
    importance: major
    source_url: "general pre-training MLOps knowledge (managed training job structure, Bayesian hyperparameter search, checkpointing), not from the exam guide"
    source_title: "General knowledge of managed ML training job configuration and troubleshooting"
    publisher: "n/a"
