claims:
  - id: cosine-similarity-definition
    claim: "Cosine similarity between two vectors is the cosine of the angle between them, computed as the dot product divided by the product of the L2 norms; scikit-learn's cosine_similarity computes this pairwise between rows of two arrays (or within one array), returning a similarity matrix."
    importance: critical
    source_url: "https://scikit-learn.org/stable/modules/generated/sklearn.metrics.pairwise.cosine_similarity.html"
    source_title: "sklearn.metrics.pairwise.cosine_similarity"
    publisher: "scikit-learn"
    accessed_at: "2026-07-16"
    primary_source: true
    evidence_note: "The API reference documents the formula (dot product of L2-normalized vectors) and the pairwise-matrix output shape."
    status: needs_reverification
  - id: pairwise-metrics-context
    claim: "scikit-learn's pairwise metrics module distinguishes distance metrics (e.g. Euclidean) from similarity/kernel measures (e.g. cosine), which behave differently with respect to vector magnitude."
    importance: minor
    source_url: "https://scikit-learn.org/stable/modules/metrics.html"
    source_title: "Pairwise metrics, Affinities and Kernels"
    publisher: "scikit-learn"
    accessed_at: "2026-07-16"
    primary_source: true
    evidence_note: "The user guide covers the general distinction between distance and similarity measures available in the module."
    status: needs_reverification
