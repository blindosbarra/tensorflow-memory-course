claims:
  - id: precision-recall-at-k
    claim: "Precision@K is the fraction of the top K retrieved items that are relevant; Recall@K is the fraction of all relevant items that appear in the top K retrieved items; both are standard information-retrieval evaluation measures."
    importance: critical
    source_url: "https://en.wikipedia.org/wiki/Mean_reciprocal_rank"
    source_title: "Mean reciprocal rank"
    publisher: "Wikipedia"
    accessed_at: "2026-07-16"
    primary_source: false
    evidence_note: "Precision@K/Recall@K are standard, widely-taught information-retrieval definitions; cited alongside the MRR reference page rather than a dedicated primary source, since these are general field definitions not tied to one product's documentation."
    status: needs_reverification
  - id: mean-reciprocal-rank-definition
    claim: "Mean Reciprocal Rank (MRR) is the average, over a set of queries, of the reciprocal of the rank of the first relevant result for each query (1/rank), ranging from 0 to 1 where 1 means every query's first result was relevant."
    importance: critical
    source_url: "https://en.wikipedia.org/wiki/Mean_reciprocal_rank"
    source_title: "Mean reciprocal rank"
    publisher: "Wikipedia"
    accessed_at: "2026-07-16"
    primary_source: true
    evidence_note: "The article defines reciprocal rank and mean reciprocal rank as used in information retrieval evaluation."
    status: needs_reverification
