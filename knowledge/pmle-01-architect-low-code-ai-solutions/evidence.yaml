    status: needs_reverification
  - id: loss-vs-metric-and-multiclass-averaging
    claim: "Loss must be differentiable (the optimizer needs its gradient) while a reported metric does not; accuracy is a poor direct optimization target (a step function with near-zero gradient almost everywhere) but a reasonable metric to report. For multi-class precision/recall/F1, per-class metrics must be aggregated one of three ways: macro-average (unweighted mean across classes, so a rare class's poor recall is not diluted by common classes), micro-average (aggregate TP/FP/FN across all classes first, effectively weighting by per-example frequency so common classes dominate, similar to aggregate accuracy's blind spot), or weighted average (macro-average weighted by each class's support, a compromise)."
    importance: major
    source_url: "general pre-training ML knowledge (standard evaluation-metric definitions), not from the exam guide"
