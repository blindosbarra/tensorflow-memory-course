  - id: evaluation-metrics-worked-example
    claim: "Worked numeric illustration of precision, recall, F1, accuracy and ROC AUC computed from a constructed 2x2 confusion matrix (200 total cases, 40 positive/'non rinnova', 28 TP / 12 FN / 18 FP / 142 TN), showing that accuracy (0.85) is misleading under class imbalance (a majority-class baseline would score 0.80) while precision (0.61) and recall (0.70) expose the false-positive/false-negative tradeoff, and that the cost asymmetry between a missed churner (FN) and a wasted retention offer (FP) is a business reason to favor recall by lowering the decision threshold on ML.PREDICT's output probability."
    importance: major
