  - id: optimizer-selection-general
    claim: "General optimizer mechanics: SGD updates weights against the raw gradient scaled by the learning rate; SGD with momentum accumulates a moving average of past updates to accelerate convergence and smooth over small irregularities; RMSprop adapts the learning rate per parameter based on recent gradient magnitude; Adam combines momentum with RMSprop-style per-parameter adaptation and is commonly used as a reasonable default requiring comparatively little manual tuning. The learning rate is described as the most impactful hyperparameter: too high causes the training loss itself to oscillate or diverge; too low causes very slow apparent progress even when the update direction is correct."
    importance: major
    source_url: "general pre-training ML knowledge (gradient-based optimization), not from the exam guide"
