  - id: sigmoid-vs-softmax-worked-example
    claim: "Worked numeric example of the softmax function applied to three class logits (2.0, 1.0, 0.1), producing probabilities that sum to 1 (~0.66, ~0.24, ~0.10 after rounding) via p_i = e^(logit_i) / sum(e^(logit_j)), followed by a categorical cross-entropy computation for the correct class (-log(0.66) ~= 0.42). Used to illustrate why softmax (probabilities summing to 1, appropriate for mutually exclusive classes) differs from independent per-neuron sigmoid (appropriate for multi-label, non-exclusive classes)."
