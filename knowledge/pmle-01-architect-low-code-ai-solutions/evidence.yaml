  - id: feature-scaling-mechanics
    claim: "LOGISTIC_REG and DNN_CLASSIFIER models in BigQuery ML train via gradient descent, so features on very different numeric scales cause the larger-scale feature's gradient to dominate training, slowing or degrading convergence on the other features. Standardization (z = (x - mean) / stddev), applied via ML.STANDARD_SCALER inside a TRANSFORM clause, corrects this; the mean/stddev are computed once on the training set and stored with the model so ML.PREDICT reapplies the identical values, avoiding train/serve drift in the scaling itself. Tree-based model types (e.g. BOOSTED_TREE_CLASSIFIER) split on value ordering per feature, not magnitude, so they do not require this normalization."
    importance: major
    source_url: "general pre-training ML knowledge (gradient descent, feature scaling), not from the exam guide"
    source_title: "General knowledge of gradient-based training and feature normalization"
    publisher: "n/a"
