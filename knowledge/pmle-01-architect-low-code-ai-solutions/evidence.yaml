    evidence_note: "Added after learner feedback that the lesson had no normalization content at all ('no section to explain normalization'). The gradient-descent mechanism and z-score formula are standard ML knowledge; ML.STANDARD_SCALER as a specific BigQuery ML function name is not re-verified against docs.cloud.google.com this session (blocked, see research_gaps.md). The worked numeric example (mean/stddev/customer values) is an invented teaching illustration, not real Nordica or Google data."
