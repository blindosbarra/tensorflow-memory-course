  - id: finetuning-vs-prompting-general
    claim: "General ML decision framework for adapting a foundational model: prompting or retrieval-augmented generation requires no weight updates and is the fastest, cheapest way to iterate; full fine-tuning updates all of a model's weights on a task-specific labeled dataset and is the most expensive option; parameter-efficient tuning methods such as LoRA train small additional adapter matrices instead of the full weight matrices, adapting behavior beyond what prompting alone achieves at a fraction of full fine-tuning's cost. This ordering (prompting first, parameter-efficient tuning next, full fine-tuning last) is the standard reasoning for 'when tuning should be considered', a phrase the exam guide itself uses in Section 3.2 without defining it."
    importance: major
    source_url: "general pre-training ML knowledge, not from the exam guide"
    source_title: "General knowledge of fine-tuning vs prompting trade-offs"
    publisher: "n/a"
