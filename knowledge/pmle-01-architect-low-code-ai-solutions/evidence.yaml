  - id: loss-function-selection-general
    claim: "Loss function choice by task: regression uses MSE (squares errors, sensitive to outliers), MAE (linear penalty, more robust to outliers), or Huber loss (quadratic near zero, linear for large errors, a compromise). Binary classification uses binary cross-entropy with a single sigmoid output unit. Mutually-exclusive multi-class classification uses categorical cross-entropy (one-hot labels) or sparse categorical cross-entropy (integer labels, same underlying math) with a softmax output layer (one unit per class, outputs sum to 1). Multi-label classification (non-exclusive labels) uses binary cross-entropy computed independently per label, with an independent sigmoid activation per output unit rather than softmax."
    importance: major
    source_url: "general pre-training ML knowledge (standard loss function definitions), not from the exam guide"
    source_title: "General knowledge of loss function selection by task type"
