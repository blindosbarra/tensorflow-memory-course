  - id: scaling-factor-rationale
    claim: "The 1/sqrt(d_k) scaling is introduced because, for large d_k, the dot products grow large in magnitude, pushing the softmax into regions with extremely small gradients; dividing by sqrt(d_k) counteracts this."
    importance: major
    source_url: "https://arxiv.org/abs/1706.03762"
