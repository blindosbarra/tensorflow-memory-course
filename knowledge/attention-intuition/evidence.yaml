    evidence_note: "Section 3.2.1 states the scaling is used to counteract the effect of large dot products pushing softmax into small-gradient regions for large values of d_k."
    status: needs_reverification
  - id: softmax-definition
    claim: "The softmax function converts a vector of real scores into a probability distribution: each output is exp(score_i) divided by the sum of exp over all scores, so outputs are non-negative and sum to 1."
    importance: major
    source_url: "https://numpy.org/doc/stable/reference/generated/numpy.exp.html"
