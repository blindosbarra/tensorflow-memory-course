    primary_source: true
    evidence_note: "Constitutional AI / RLAIF uses AI-generated preferences in place of human labels; RLHF (Ouyang et al., 2022) uses human labels + RL; DPO (Rafailov et al., 2023) removes the RL loop. The human-vs-AI (who labels) and RL-vs-direct (how to optimize) axes are orthogonal. NOT verified live; needs_reverification per 3.2."
