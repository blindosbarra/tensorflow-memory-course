claims:
  - id: exponential-decay-definition
    claim: "Exponential decay is a process in which a quantity decreases at a rate proportional to its current value, characterized by a constant half-life: the time after which the quantity is reduced to half its initial value, independent of the starting point."
    importance: critical
    source_url: "https://en.wikipedia.org/wiki/Exponential_decay"
    source_title: "Exponential decay"
    publisher: "Wikipedia"
    accessed_at: "2026-07-18"
    primary_source: true
    evidence_note: "The article defines exponential decay and its constant-half-life property, the mathematical basis for the recency_score formula used in this lesson."
    status: needs_reverification
  - id: half-life-definition
    claim: "Half-life is the time required for a quantity undergoing exponential decay to be reduced to half of its initial value; the property holds regardless of the initial value (memorylessness of the decay rate)."
    importance: major
    source_url: "https://en.wikipedia.org/wiki/Half-life"
    source_title: "Half-life"
    publisher: "Wikipedia"
    accessed_at: "2026-07-18"
    primary_source: true
    evidence_note: "The article formally defines half-life, the property verified by the assert in the lesson's exercise."
    status: needs_reverification
  - id: pandas-timestamp-arithmetic
    claim: "pandas.Timestamp supports arithmetic with Timedelta objects and subtraction between Timestamps to produce a Timedelta, usable to compute elapsed time between two dates."
    importance: minor
    source_url: "https://pandas.pydata.org/docs/reference/api/pandas.Timestamp.html"
    source_title: "pandas.Timestamp"
    publisher: "pandas"
    accessed_at: "2026-07-18"
