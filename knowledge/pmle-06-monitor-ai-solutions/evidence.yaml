  - id: pmle-drift-definitions-general
    claim: "Data drift: the statistical distribution of input features in production diverges from what the model was trained on. Concept drift: the relationship between inputs and the true target changes over time, even if input distribution stays the same. Feature attribution drift: the relative importance of features to the model's predictions shifts over time."
    importance: minor
