    evidence_note: "Added at the learner's request for a stronger view of how Domain 6's 'model explainability' consideration is actually implemented, not just named. Standard explainability-method knowledge, not verified against current Vertex AI Explainable AI documentation this session (blocked, see research_gaps.md); exact method names/parameters as offered by a specific Google Cloud service not confirmed. The worked contribution-score numbers are an invented teaching example."
    status: needs_reverification
  - id: model-monitoring-job-configuration
    claim: "Configuring a model monitoring job requires: a baseline (typically training-set statistics used as the 'normal' reference), a monitoring objective (skew detection compares served data against the training baseline, catching training-serving skew and data drift; drift detection compares a recent serving window against a prior serving window, catching change over time even without a training reference), a sampling rate (monitoring every request is costly, so typically only a percentage of traffic is sampled), per-feature alert thresholds, and a notification channel (e.g. email or a Pub/Sub topic). Request-response logging to a table is the data source feeding both automated monitoring and periodic human-reviewed sampling; infrastructure logs (latency, error rate, replica count) answer a different question ('is the service healthy?') from model-quality monitoring ('is the model still predicting well?') and need separate dashboards."
    importance: major
    source_url: "general pre-training MLOps knowledge (managed model monitoring job structure), not from the exam guide"
    source_title: "General knowledge of model monitoring job configuration (baseline, skew vs drift detection, sampling, alerting)"
