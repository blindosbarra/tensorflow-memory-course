  - id: explainable-ai-implementation
    claim: "Explainability requests, alongside a prediction, return an estimated per-feature contribution score for that specific input row (at additional compute cost vs. a plain prediction). Two general families of method: Sampled Shapley works for any model type (including black-box) by sampling many random subsets of present/absent features and observing how the prediction changes, at significant compute cost; Integrated Gradients requires a differentiable model and follows the gradient of the prediction along a path from a neutral baseline input to the actual input, cheaper than Sampled Shapley but inapplicable to non-differentiable models like trees."
    importance: major
    source_url: "general pre-training ML knowledge (Sampled Shapley, Integrated Gradients), not from the exam guide"
    source_title: "General knowledge of feature-attribution explainability methods"
    publisher: "n/a"
