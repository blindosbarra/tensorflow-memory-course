    - "Network egress to docs.python.org not tested live this session; same proxy restriction pattern logged earlier in this session (course/research_gaps.md)."
    - "The contradiction-detection heuristic (polarity via likes/prefers/dislikes keywords, topic overlap via stopword-filtered content words) and the update policy (mark superseded_by, never delete) are explicit Memory AI Lab design choices for this lesson, not sourced from external literature — declared as such in the lesson body, including an honest demonstration of a case the heuristic does NOT catch (same-dimension value conflict without explicit polarity keywords, e.g. 'morning' vs 'evening' sessions)."
