    - "During development, the first implementation of the update loop had a real pandas indexing bug: computing the conflict boolean mask on a filtered subset (archivio_preference[...isna()].apply(...)) produced a Series with a partial index misaligned with the full DataFrame on the second and third loop iterations, causing archivio_preference.loc[mask, col] = ... to raise TypeError: unhashable type: 'Series' on the third new memory (the one with zero conflicts). Fixed by computing the mask via .apply() over the FULL archivio_preference DataFrame (checking 'superseded_by is None' inside the same lambda) so the boolean mask's index always matches the DataFrame's full index across iterations. Verified by re-running the notebook end to end after the fix (uv run via nbclient) with no errors."
