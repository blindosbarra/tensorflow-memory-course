  - id: endpoint-deploy-autoscale-batch-implementation
    claim: "Serving a model online requires three concrete steps: registering the trained model as a versioned resource in a model registry, creating a stable endpoint resource (which holds no model by itself), and deploying one or more model versions to that endpoint with a machine type, min/max replica count, and (when multiple versions are deployed) a traffic-split percentage between them — changing the split is a configuration update, not a new deploy. Autoscaling uses min-replica-count/max-replica-count plus a target utilization metric; min-replica-count=0 is the cheapest option but introduces cold-start latency on the first request after idle, while min-replica-count>=1 costs more but keeps a replica always warm. A batch prediction job, by contrast, does not create or use an endpoint: it reads directly from input data (e.g. BigQuery or Cloud Storage), writes output, and releases compute when done, unlike an always-available online endpoint."
    importance: major
    source_url: "general pre-training MLOps knowledge (managed model serving structure), not from the exam guide"
