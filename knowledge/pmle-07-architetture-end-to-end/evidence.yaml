  - id: pmle07-mlops-traditional-vs-genai
    claim: "Comparison table contrasting traditional-ML MLOps (train on labeled data, evaluate with fixed numeric metrics, version data/code/weights, retrain on a metric-degradation policy, monitor for skew/drift) against generative-AI LLMOps (often no training from scratch — prompting/RAG/tuning ladder instead, evaluate via LLM-as-a-judge/AutoSxS calibrated against human judgment, version prompts/RAG context in addition to weights, iterate on prompts/context before considering a new tuning round, additionally monitor for prompt injection/data leakage/toxicity via tools like Model Armor)."
